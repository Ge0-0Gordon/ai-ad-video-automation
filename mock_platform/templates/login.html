<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Mock Editing Platform Login</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 720px; margin: 48px auto; line-height: 1.5; }
      label { display: block; margin: 16px 0 6px; font-weight: 700; }
      input, button { box-sizing: border-box; font: inherit; padding: 10px; width: 100%; }
      button { margin-top: 20px; cursor: pointer; }
    </style>
  </head>
  <body>
    <main>
      <h1 data-testid="login-heading">Mock Editing Platform</h1>
      <form method="post" action="/login">
        <label for="username">Username</label>
        <input id="username" name="username" data-testid="username-input" value="demo">

        <label for="password">Password</label>
        <input id="password" name="password" type="password" data-testid="password-input" value="demo">

        <button type="submit" data-testid="login-submit">Log in</button>
      </form>
    </main>
  </body>
</html>
